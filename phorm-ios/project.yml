name: phorm-ios
options:
  bundleIdPrefix: com.quyctd
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 97J4X88D7H
targets:
  Phorm:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Phorm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quyctd.phorm
        CODE_SIGN_ENTITLEMENTS: Phorm/Phorm.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Ấn Điểm
        # GENERATE_INFOPLIST_FILE=YES means Xcode synthesizes these into the
        # bundled Info.plist — they MUST be build settings, not plist keys, or
        # the App Store upload validator sees empty strings and rejects.
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "6"
        # iPhone-only — the lacquer surface assumes single-pane portrait (see
        # DESIGN.md "Known Gaps"). Universal would force us to declare all four
        # iPad orientations, which the app isn't designed for. 1 = iPhone, 2 =
        # iPad, "1,2" = universal.
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Phorm/Info.plist
      properties:
        CFBundleDisplayName: Ấn Điểm
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.quyctd.phorm.import
            CFBundleURLSchemes:
              - phorm
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  PhormTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhormTests
    dependencies:
      - target: Phorm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quyctd.phorm.Tests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Phorm:
    build:
      targets:
        Phorm: all
        PhormTests: [test]
    test:
      targets:
        - PhormTests
      gatherCoverageData: false
