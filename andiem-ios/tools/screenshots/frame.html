<!DOCTYPE html>
<!--
  frame.html — one App Store marketing panel, 1320×2868 (6.9").
  Renders a single screen chosen by ?screen=session|summary|roundEntry.
  The raw device capture (raw/<screen>.png) is framed in a dark bezel over a
  Hà Nội cũ cream-paper field with a cinnabar headline and gold-leaf accent.
  Rendered to PNG by render.sh via headless Chrome at device-scale 1.
-->
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,600;0,700;1,600;1,700&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Hà Nội cũ tokens (DESIGN.md) */
    --cinnabar: #8c2a22;
    --cinnabar-deep: #5a1612;
    --oxblood: #5d1a18;
    --gold: #d9b25a;
    --gold-bright: #e8c570;
    --cream: #f3e8d2;
    --cream-dim: #d6c4a0;
    --ochre: #a8754a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1320px; height: 2868px; overflow: hidden; }
  body {
    /* Warm paper field — cream centre deepening to ochre at the edges. */
    background:
      radial-gradient(120% 90% at 50% 8%, #fbf3e2 0%, var(--cream) 42%, #e7d4b0 100%);
    position: relative;
    font-family: "IBM Plex Serif", serif;
  }
  /* Faint halftone dot texture — vernacular print, kept very low. */
  body::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(var(--cinnabar) 1.4px, transparent 1.6px);
    background-size: 26px 26px;
    opacity: 0.05;
    pointer-events: none;
  }
  /* Hairline frame inset — like a printed label border. */
  body::after {
    content: "";
    position: absolute; inset: 46px;
    border: 2px solid rgba(140, 42, 34, 0.22);
    pointer-events: none;
  }

  .stage {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 200px 150px 150px;
  }

  /* ── Header ───────────────────────────────────────────── */
  .kicker {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 40px;
  }
  .seal {
    width: 76px; height: 76px;
    display: grid; place-items: center;
    color: var(--cream);
    font-family: "Noto Serif Display", serif; font-weight: 700;
    font-size: 40px;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold) 55%, #b8923f);
    box-shadow: 0 6px 18px rgba(140,42,34,0.28), inset 0 0 0 2px rgba(90,22,18,0.35);
    border-radius: 6px;
  }
  .seal span { color: var(--cinnabar-deep); transform: translateY(1px); }
  .kicker .word {
    font-family: "Noto Serif Display", serif;
    font-weight: 700; font-style: italic;
    font-size: 46px; color: var(--cinnabar);
    letter-spacing: 0.5px;
  }

  h1 {
    font-family: "Noto Serif Display", serif;
    font-weight: 700; font-style: italic;
    font-size: 116px; line-height: 1.02;
    color: var(--cinnabar);
    text-align: center;
    max-width: 1020px;
    text-wrap: balance;
  }
  .sub {
    margin-top: 36px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic; font-weight: 600;
    font-size: 56px; line-height: 1.25;
    color: var(--ochre);
    text-align: center;
    max-width: 880px;
  }
  .rule {
    margin-top: 44px;
    width: 132px; height: 5px;
    background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
  }

  /* ── Device ───────────────────────────────────────────── */
  .device-wrap {
    margin-top: auto;
    position: relative;
  }
  .device {
    width: 840px;
    background: #160a09;
    border-radius: 96px;
    padding: 22px;
    box-shadow:
      0 60px 120px -30px rgba(90,22,18,0.55),
      0 24px 50px -20px rgba(0,0,0,0.35),
      inset 0 0 0 2px rgba(217,178,90,0.30);
  }
  .device img {
    display: block;
    width: 100%;
    border-radius: 76px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="kicker">
      <div class="seal"><span id="seal">壹</span></div>
      <div class="word">Ấn Điểm</div>
    </div>
    <h1 id="headline">—</h1>
    <div class="sub" id="sub">—</div>
    <div class="rule"></div>
    <div class="device-wrap">
      <div class="device"><img id="shot" alt="" /></div>
    </div>
  </div>

<script>
  const PANELS = {
    session: {
      seal: "壹",
      headline: "Mở app là chơi.",
      sub: "Phỏm, Sâm — ghi điểm cả bàn, không cài đặt, không mạng.",
    },
    roundEntry: {
      seal: "封",
      headline: "Ô cuối tự điền.",
      sub: "Nhập N−1 người, app tính nốt phần còn lại.",
    },
    summary: {
      seal: "印",
      headline: "Ấn vàng cho người thắng.",
      sub: "Tổng kết mỗi ván — đóng dấu rồi chia sẻ.",
    },
    newSession: {
      seal: "始",
      headline: "Mở phiên trong vài giây.",
      sub: "Dùng lại nhóm cũ, hoặc gõ tên — không cài đặt.",
    },
    history: {
      seal: "簿",
      headline: "Cả cuốn sổ trong túi.",
      sub: "Mọi ván đã chơi, ai vô địch — lưu sẵn, không cần mạng.",
    },
  };
  const params = new URLSearchParams(location.search);
  const screen = params.get("screen") || "session";
  const p = PANELS[screen] || PANELS.session;
  document.getElementById("seal").textContent = p.seal;
  document.getElementById("headline").textContent = p.headline;
  document.getElementById("sub").textContent = p.sub;
  document.getElementById("shot").src = "raw/" + screen + ".png";
</script>
</body>
</html>
